        - paragraph [ref=e187]: A simple yet impressive whole roast chicken with crispy skin and juicy meat, perfumed with lemon and garlic.
        - generic [ref=e188]:
          - heading "Ingredients" [level=2] [ref=e189]
          - generic [ref=e190]: 1 whole chicken (about 1.5kg), 1 lemon (halved), 6 cloves garlic, 3 tbsp butter (softened), 1 tbsp fresh thyme leaves, 1 tbsp fresh rosemary, salt and pepper, 2 tbsp olive oil
        - generic [ref=e191]:
          - heading "Instructions" [level=2] [ref=e192]
          - generic [ref=e193]: 1. Preheat oven to 200°C (400°F). 2. Mix butter with thyme, rosemary, salt and pepper. 3. Loosen chicken skin and rub butter mixture under skin and all over the outside. 4. Stuff cavity with lemon halves and garlic. 5. Drizzle with olive oil. 6. Roast for 1 hour 20 min or until juices run clear. 7. Rest 10 min before carving.
